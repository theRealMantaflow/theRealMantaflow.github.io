<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeram's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">
    <script src="data.js" defer></script>
    <script src="scripts.js" defer></script>
</head>

<body>

    <div class="overlay"></div>
    <nav class="tabs-container" id="nav-container">
        <button class="scroll-arrow left-arrow" id="scroll-left" aria-label="Scroll left">&#10094;</button>

        <div class="tabs" id="tab-controls">
            <button class="tab-button active" data-target="tab-about">About</button>
            <button class="tab-button" data-target="tab-experience">Experience</button>
            <button class="tab-button" data-target="tab-projects">Projects</button>
            <button class="tab-button" data-target="tab-education">Education</button>
        </div>

        <button class="scroll-arrow right-arrow" id="scroll-right" aria-label="Scroll right">&#10095;</button>
    </nav>

    <main class="content-wrapper">
        <div id="tab-about" class="tab-content active">
            <header>
                <h1 id="name"></h1>
            </header>

            <section>
                <div class="about-card" style="position: relative;">
                    <img src="assets/gifs_and_pics/ayakaHello.gif" alt="Ayaka Greeting" class="ayaka-gif">
                    <h2 align="left" style="margin-top: 0;">About Me</h2>
                    <p align="left" id="about"></p>
                </div>
            </section>

            <section>
                <h2>Skills</h2>
                <div id="skills"></div>
            </section>
        </div>

        <div id="tab-experience" class="tab-content">
            <section>
                <h2>Experience</h2>
                <div id="work_experience"></div>
            </section>
        </div>

        <div id="tab-projects" class="tab-content">
            <section>
                <h2>Projects</h2>
                <div id="projects"></div>
            </section>
        </div>

        <div id="tab-education" class="tab-content">
            <section>
                <h2>Education</h2>
                <div id="education"></div>
            </section>
        </div>
    </main>

    <footer>
        <p id="contact"></p>
        <p id="copyrights"></p>
        <p id="bgCredits"></p>
    </footer>

    <div id="imageModal" class="modal" aria-hidden="true">
        <div class="modal-close" role="button" aria-label="Close image">×</div>
        <div class="modal-viewer">
            <img id="modalImg" class="modal-content" alt="Enlarged project image">
        </div>
        <div class="zoom-controls">
            <label for="zoomSlider">Zoom</label>
            <input id="zoomSlider" type="range" min="1" max="3" step="0.05" value="1">
        </div>
    </div>

</body>

</html>
