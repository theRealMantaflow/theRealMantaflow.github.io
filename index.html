<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<header>
    <h1 id="name"></h1>
    <p id="about"></p>
</header>

<section>
    <h2>Skills</h2>
    <div id="skills"></div>
</section>

<section>
    <h2>Projects</h2>
    <div id="projects"></div>
</section>

<footer>
    <p id="contact"></p>
</footer>

<script src="data.js"></script>
<script>
    document.getElementById("name").innerText = data.name;
    document.getElementById("about").innerText = data.about;
    document.getElementById("contact").innerHTML = data.contact;

    // Skills
    const skillsDiv = document.getElementById("skills");
    data.skills.forEach(skill => {
        const el = document.createElement("span");
        el.className = "skill";
        el.innerText = skill;
        skillsDiv.appendChild(el);
    });

    // Projects with gallery
    const projDiv = document.getElementById("projects");

    data.projects.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";

        const gallery = document.createElement("div");
        gallery.className = "gallery";

        p.images.forEach(img => {
            const image = document.createElement("img");
            image.src = img;
            gallery.appendChild(image);
        });

        card.innerHTML = `
            <h3>${p.title}</h3>
            <div class="description">${p.description}</div>
        `;

        card.appendChild(gallery);
        projDiv.appendChild(card);
    });
</script>

</body>
</html>
